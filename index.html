<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>SİR – Kuşadası Belediyesi</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<style>
:root {
  --navy: #1a2744;
  --navy2: #243260;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --bg: #f0f2f7;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #6b7280;
  --border: #e2e8f0;
  --green: #16a34a;
  --red: #dc2626;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(26,39,68,.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
.nav {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-logo { height: 40px; width: auto; border-radius: 4px; }
.nav-title { color: #fff; }
.nav-title strong { display: block; font-size: 15px; letter-spacing: .3px; }
.nav-title span { font-size: 10px; color: rgba(255,255,255,.6); letter-spacing: 1.5px; text-transform: uppercase; }
.nav-badge {
  background: var(--gold); color: var(--navy);
  border-radius: 20px; font-size: 12px; font-weight: 700;
  padding: 3px 10px; min-width: 28px; text-align: center;
}

/* ── TABS ── */
.tabs {
  display: flex; background: var(--navy);
  border-top: 1px solid rgba(255,255,255,.08);
}
.tab-btn {
  flex: 1; background: none; border: none; color: rgba(255,255,255,.55);
  font-size: 13px; font-weight: 500; padding: 11px 4px; cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .2s; letter-spacing: .3px;
}
.tab-btn.active { color: var(--gold2); border-bottom-color: var(--gold2); }

/* ── SAYFA ── */
.page { display: none; padding: 16px; max-width: 680px; margin: 0 auto; }
.page.active { display: block; }

/* ── KART ── */
.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden;
}
.card-head {
  background: linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 12px 16px; display: flex; align-items: center; gap: 8px;
}
.card-head-icon { font-size: 18px; }
.card-head h2 { color: #fff; font-size: 14px; font-weight: 600; letter-spacing: .4px; }
.card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

/* ── FORM ── */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.field input, .field textarea, .field select {
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 13px; font-size: 14px; color: var(--text);
  background: #fafbfc; transition: border .2s; font-family: inherit; width: 100%;
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-color: var(--navy2); background: #fff;
}
.field textarea { resize: vertical; min-height: 80px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── CHECKBOX TALEP ── */
.talep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.chk-item {
  display: flex; align-items: center; gap: 8px;
  background: #f8f9fc; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 10px 12px; cursor: pointer;
  transition: all .18s; font-size: 13px; font-weight: 500; user-select: none;
}
.chk-item:has(input:checked) { background: #eef2ff; border-color: var(--navy2); color: var(--navy2); }
.chk-item input { accent-color: var(--navy2); width: 16px; height: 16px; cursor: pointer; }

/* ── VAR/YOK TOGGLE ── */
.toggle-group { display: flex; gap: 8px; }
.tog-btn {
  flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
  background: #f8f9fc; color: var(--muted); transition: all .18s; text-align: center;
}
.tog-btn.active-evet { background: #ecfdf5; border-color: #16a34a; color: #16a34a; }
.tog-btn.active-hayir { background: #fef2f2; border-color: #dc2626; color: #dc2626; }

/* ── ARAÇ/TAPU RADIO ── */
.radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
.rad-btn {
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer;
  background: #f8f9fc; color: var(--muted); transition: all .18s; white-space: nowrap;
}
.rad-btn.secili { background: #eef2ff; border-color: var(--navy2); color: var(--navy2); }

/* ── GİZLİ ALAN ── */
.gizli { display: none; }
.gizli.acik { display: flex; flex-direction: column; gap: 8px; }

/* ── FOTOĞRAF YÜKLEME ── */
.foto-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 20px; text-align: center; cursor: pointer; transition: all .2s;
  background: #fafbfc;
}
.foto-zone:hover { border-color: var(--navy2); background: #eef2ff; }
.foto-zone-ikon { font-size: 32px; margin-bottom: 8px; }
.foto-zone p { color: var(--muted); font-size: 13px; }
.foto-zone small { color: #9ca3af; font-size: 11px; }
.foto-preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
.foto-durum {
  margin-top: 8px; padding: 8px 12px; border-radius: 8px; font-size: 13px;
  display: none; font-weight: 500;
}
.foto-durum.yukleniyor { background: #fff7e6; border: 1.5px solid #f3d08a; color: #8a5b00; }
.foto-durum.basarili { background: #ecfdf5; border: 1.5px solid #6ee7b7; color: #065f46; }
.foto-durum.hata { background: #fef2f2; border: 1.5px solid #fca5a5; color: #991b1b; }

/* ── BUTONLAR ── */
.btn { border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .18s; display: inline-flex; align-items: center; gap: 7px; }
.btn-primary { background: linear-gradient(135deg, var(--navy), var(--navy2)); color: #fff; }
.btn-primary:active { transform: scale(.97); }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); }
.btn-green { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; }
.btn-red { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; }
.btn-ghost { background: #f1f5f9; color: var(--muted); }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-block { width: 100%; justify-content: center; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── LİSTE ── */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input { width: 100%; padding: 11px 16px 11px 40px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; background: var(--card); }
.search-wrap::before { content: "🔍"; position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; }
.liste-bos { text-align: center; padding: 48px 16px; color: var(--muted); }
.liste-bos-ikon { font-size: 48px; margin-bottom: 12px; }
.kayit-kart {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  margin-bottom: 10px; overflow: hidden; border: 1.5px solid transparent; transition: border .2s;
}
.kayit-kart.secili-kart { border-color: var(--navy2); }
.kayit-kart-ust { padding: 14px 16px 10px; }
.kayit-kart-ad { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.kayit-kart-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
.kayit-kart-alt {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 7px; align-items: center; flex-wrap: wrap;
}
.seç-chk { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; }
.seç-chk input { accent-color: var(--navy2); }
.liste-toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

/* ── MESAJ ── */
.mesaj-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600;
  z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,.2); display: none;
  max-width: 90vw; text-align: center;
}
.mesaj-bar.ok { background: #ecfdf5; color: #065f46; border: 1.5px solid #6ee7b7; }
.mesaj-bar.err { background: #fef2f2; color: #991b1b; border: 1.5px solid #fca5a5; }

/* ── PİN ── */
#pin-ekran {
  position: fixed; inset: 0; z-index: 9999; display: flex;
  align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--navy) 0%, #0f1620 100%);
}
.pin-kart { width: 300px; background: rgba(255,255,255,.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.12); border-radius: 24px; overflow: hidden; text-align: center; }
.pin-ust { padding: 30px 20px 20px; }
.pin-logo { height: 60px; margin-bottom: 12px; }
.pin-baslik { color: #fff; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.pin-alt { color: rgba(255,255,255,.5); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
.pin-dots { display: flex; justify-content: center; gap: 14px; margin: 20px 0 16px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.25); transition: all .15s; }
.pin-dot.dolu { background: var(--gold); border-color: var(--gold); }
.pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: rgba(255,255,255,.08); border-top: 1px solid rgba(255,255,255,.08); }
.pin-tuş { background: rgba(255,255,255,.03); color: #fff; border: none; font-size: 22px; font-weight: 500; padding: 18px; cursor: pointer; transition: background .15s; -webkit-tap-highlight-color: transparent; }
.pin-tuş:active { background: rgba(201,168,76,.25); }
.pin-sil { color: rgba(255,255,255,.4); font-size: 18px; }
.pin-hata { color: #f87171; font-size: 12px; padding: 8px; min-height: 32px; }

@media (max-width: 420px) {
  .grid2 { grid-template-columns: 1fr; }
  .talep-grid { grid-template-columns: 1fr 1fr; }
  .btn-row { gap: 6px; }
  .btn { padding: 10px 14px; font-size: 13px; }
}
</style>
</head>

            <button class="tog-btn" id="sydv-hayir" onclick="toggleVar('sydv','hayir')">❌ Yok</button>

            <button class="tog-btn" id="bel-evet" onclick="toggleVar('bel','evet')">✅ Var</button>
            <button class="tog-btn" id="bel-hayir" onclick="toggleVar('bel','hayir')">❌ Yok</button>
          </div>
          <div class="gizli" id="bel-alan">
            <textarea id="belediye" rows="2" placeholder="Geçmiş yardım detayı…"></textarea>
          </div>
        </div>

        <!-- GENEL NOTLAR -->
        <div class="field">
          <label>Genel Notlar / Değerlendirme</label>
          <textarea id="notlar" rows="3" placeholder="Sosyal hizmet uzmanının değerlendirmesi…"></textarea>
        </div>

        <!-- FOTOĞRAF & PDF YÜKLEME -->
        <div class="field">
          <label>Belge / Fotoğraf Yükleme</label>
          <div class="foto-zone" id="foto-zone" onclick="document.getElementById('foto-input').click()">
            <div class="foto-zone-ikon" id="foto-ikon">📎</div>
            <p id="foto-yazi">Fotoğraf veya PDF seçmek için dokunun</p>
            <small>JPG, PNG veya PDF</small>
          </div>
          <input type="file" id="foto-input" accept="image/*,application/pdf" style="display:none" onchange="fotoSec()"/>
          <img id="foto-preview" class="foto-preview" alt="Önizleme"/>
          <div class="foto-durum" id="foto-durum"></div>
          <div class="field" style="margin-top:8px;">
            <label>Belge Linki</label>
            <input id="dosya_link" type="url" placeholder="Yükleme sonrası otomatik dolar" readonly/>

      </div>
    </div>

    <!-- KAYDET BUTONU -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;padding-bottom:30px;">
      <button class="btn btn-primary btn-block" onclick="kaydet()">
        <span>💾</span> <span id="kaydet-label">Kaydet</span>
      </button>
      <button class="btn btn-gold" style="flex:1;" onclick="wordIndir()">📄 Word İndir</button>
      <button class="btn btn-ghost" style="flex:1;" onclick="yeniForm()">➕ Yeni</button>

  </div>
  <!-- END FORM -->

  <!-- ══ LİSTE SAYFASI ══ -->
  <div id="page-liste" class="page">

      <button class="btn btn-ghost btn-sm" onclick="tumunuSec()">☑️ Tümünü Seç</button>
      <button class="btn btn-ghost btn-sm" onclick="secimiTemizle()">🔲 Kaldır</button>
      <button class="btn btn-green btn-sm" onclick="secilenWordIndir()">🖨️ Seçilenleri İndir</button>
      <button class="btn btn-red btn-sm" id="btn-tumunu-sil" style="display:none" onclick="tumunuSil()">🗑️ Tümünü Sil</button>
      <button class="btn btn-gold btn-sm" onclick="yeniForm()">➕ Yeni</button>

      <input id="arama" type="search" placeholder="Ad, talep veya not içinde ara…" oninput="renderListe()"/>
    </div>
    <div id="liste-konteyner"></div>
  </div>

</div><!-- end app -->

<div class="mesaj-bar" id="mesaj-bar"></div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB9tYLbLRiY9HEfJQLQcyI5aij6wY2Qw_E",
  authDomain: "rapor-1192a.firebaseapp.com",
  projectId: "rapor-1192a",
  storageBucket: "rapor-1192a.firebasestorage.app",
  messagingSenderId: "880961076992",
  appId: "1:880961076992:web:7cd6e7e03c066e06c7fde5"
};
const IMGBB_KEY = "a4bf9947bd3106b22e140266f63c713b";
const PIN_KODU  = "0211";

firebase.initializeApp(FIREBASE_CONFIG);
const db  = firebase.firestore();
const col = db.collection("raporlar");

// ── PIN ──
let _pin = "";
function pGir(r) {
  if (_pin.length >= 4) return;
  _pin += r; _pinGuncelle();
  if (_pin.length === 4) setTimeout(_pinKontrol, 150);
}
function pSil() { _pin = _pin.slice(0,-1); _pinGuncelle(); document.getElementById("pin-hata").textContent = ""; }
function _pinGuncelle() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById("pd"+i);
    d.style.background     = i < _pin.length ? "var(--gold)" : "rgba(255,255,255,.15)";
    d.style.borderColor    = i < _pin.length ? "var(--gold)" : "rgba(255,255,255,.25)";
    d.style.boxShadow      = i < _pin.length ? "0 0 8px rgba(201,168,76,.5)" : "none";
  }
}
function _pinKontrol() {
  if (_pin === PIN_KODU) {
    try { localStorage.setItem("sir_pin", PIN_KODU); } catch(e) {}
    document.getElementById("pin-ekran").style.display = "none";
    document.getElementById("app").style.display = "block";
    appBaslat();
  } else {
    document.getElementById("pin-hata").textContent = "Hatalı PIN, tekrar deneyin";
    _pin = "";
    setTimeout(() => { _pinGuncelle(); document.getElementById("pin-hata").textContent = ""; }, 800);
  }
}
document.addEventListener("keydown", e => {
  if (document.getElementById("pin-ekran").style.display === "none") return;
  if (e.key >= "0" && e.key <= "9") pGir(e.key);
  if (e.key === "Backspace") pSil();
});
// Daha önce girilmiş mi?
try {
  if (localStorage.getItem("sir_pin") === PIN_KODU) {
    document.getElementById("pin-ekran").style.display = "none";
    document.getElementById("app").style.display = "block";
  }
} catch(e) {}

// ── STATE ──
let secili = null, cache = [], secilenler = new Set(), fotoBlob = null, fotoImgbbLink = "";
let aracDurum = "", tapuDurum = "", sydvDurum = "", belDurum = "";

// ── YARDIMCI ──
function bugun() { return new Date().toISOString().slice(0,10); }
function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function tarihGoster(d) {
  if (!d) return "";
  if (d.includes("-") && d.length === 10) { const [y,m,g]=d.split("-"); return `${g}.${m}.${y}`; }
  return d;
}
function mesaj(txt, ok=true) {
  const el = document.getElementById("mesaj-bar");
  el.textContent = txt; el.className = "mesaj-bar " + (ok?"ok":"err");
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 3000);
}

// ── TAB ──
function gosterTab(t) {
  document.getElementById("page-form").classList.toggle("active", t==="form");
  document.getElementById("page-liste").classList.toggle("active", t==="liste");
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", (i===0&&t==="form")||(i===1&&t==="liste")));
  if (t === "liste") renderListe();
}

// ── TALEP DEĞİŞTİ ──
function talepDegisti() {
  const digerSec = document.getElementById("t_diger").checked;
  document.getElementById("diger-alan").classList.toggle("acik", digerSec);
}

// ── ARAÇ / TAPU RADIO ──
function radioSec(tip, deger, btn) {
  const container = document.getElementById(tip+"-radio");
  container.querySelectorAll(".rad-btn").forEach(b => b.classList.remove("secili"));
  btn.classList.add("secili");
  const alan = document.getElementById(tip+"-aciklama");
  if (deger === "var") { alan.classList.add("acik"); }
  else { alan.classList.remove("acik"); }
  if (tip === "arac") aracDurum = deger;
  if (tip === "tapu") tapuDurum = deger;
}

// ── SYDV / BELEDİYE TOGGLE ──
function toggleVar(tip, deger) {
  const evetBtn  = document.getElementById(tip+"-evet");
  const hayirBtn = document.getElementById(tip+"-hayir");
  const alan     = document.getElementById(tip+"-alan");
  evetBtn.classList.toggle("active-evet",  deger==="evet");
  hayirBtn.classList.toggle("active-hayir", deger==="hayir");
  alan.classList.toggle("acik", deger==="evet");
  if (tip === "sydv") sydvDurum = deger;
  if (tip === "bel")  belDurum  = deger;
}

// ── FOTOĞRAF YÜKLEME ──
async function fotoSec() {
  const file = document.getElementById("foto-input").files?.[0];
  if (!file) return;
  const durum = document.getElementById("foto-durum");
  const preview = document.getElementById("foto-preview");
  const linkEl = document.getElementById("dosya_link");

  durum.className = "foto-durum yukleniyor";
  durum.style.display = "block";
  durum.textContent = "⏳ Yükleniyor…";
  document.getElementById("foto-yazi").textContent = "📎 " + file.name;
  document.getElementById("foto-ikon").textContent = "";

  const reader = new FileReader();
  reader.onload = async function(e) {
    const dataUrl = e.target.result;
    // Önizleme (fotoğraflar için)
    if (file.type.startsWith("image/")) {
      preview.src = dataUrl;
      preview.style.display = "block";
    }
    // imgbb'ye base64 gönder
    try {
      const b64 = dataUrl.split(",")[1];
      const fd  = new FormData();
      fd.append("image", b64);
      const res  = await fetch("https://api.imgbb.com/1/upload?key=" + IMGBB_KEY, { method: "POST", body: fd });
      const data = await res.json();
      if (data && data.success) {
        fotoImgbbLink = data.data.url;
        linkEl.value  = fotoImgbbLink;
        fotoBlob = file;
        durum.className = "foto-durum basarili";
        durum.textContent = "✅ Yüklendi: " + data.data.url;
      } else {
        throw new Error((data && data.error && data.error.message) || "Başarısız");
      }
    } catch(err) {
      durum.className = "foto-durum hata";
      durum.textContent = "⚠️ Link alınamadı ama dosya seçildi. (" + err.message + ")";
      fotoBlob = file;
      fotoImgbbLink = "";
      linkEl.value = "";
    }
  };
  reader.readAsDataURL(file);
}

// ── FORM GET/SET ──
function getForm() {
  const talep = [];
  if (document.getElementById("t_nakdi").checked)   talep.push("Nakdi Yardım");
  if (document.getElementById("t_erzak").checked)   talep.push("Erzak");
  if (document.getElementById("t_yasli").checked)   talep.push("Yaşlı Bakım");
  if (document.getElementById("t_engelli").checked) talep.push("Engelli");
  if (document.getElementById("t_evbakım").checked) talep.push("Evde Bakım");
  if (document.getElementById("t_diger").checked)   talep.push("Diğer");
  return {
    ad_soyad:    document.getElementById("ad_soyad").value.trim(),
    tc:          document.getElementById("tc").value.trim(),
    dogum:       document.getElementById("dogum").value,
    telefon:     document.getElementById("telefon").value.trim(),
    medeni:      document.getElementById("medeni").value,
    adres:       document.getElementById("adres").value.trim(),
    tarih:       document.getElementById("tarih").value,
    basvuru_no:  document.getElementById("basvuru_no").value.trim(),
    talep:       talep.join(", "),
    diger_talep: document.getElementById("diger_talep").value.trim(),
    kisi:        document.getElementById("kisi").value.trim(),
    gelir:       document.getElementById("gelir").value.trim(),
    saglik:      document.getElementById("saglik").value.trim(),
    borc:        document.getElementById("borc").value.trim(),
    arac:        aracDurum,
    arac_not:    document.getElementById("arac_not").value.trim(),
    tapu:        tapuDurum,
    tapu_not:    document.getElementById("tapu_not").value.trim(),
    sydv_durum:  sydvDurum,
    sydv:        document.getElementById("sydv").value.trim(),
    bel_durum:   belDurum,
    belediye:    document.getElementById("belediye").value.trim(),
    notlar:      document.getElementById("notlar").value.trim(),
    dosya_link:  fotoImgbbLink || document.getElementById("dosya_link").value.trim(),
  };
}
function setForm(f) {
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v || ""; };
  set("ad_soyad", f.ad_soyad); set("tc", f.tc); set("dogum", f.dogum);
  set("telefon", f.telefon); set("adres", f.adres);
  set("tarih", f.tarih || bugun()); set("basvuru_no", f.basvuru_no);
  set("diger_talep", f.diger_talep); set("kisi", f.kisi); set("gelir", f.gelir);
  set("saglik", f.saglik); set("borc", f.borc);
  set("arac_not", f.arac_not); set("tapu_not", f.tapu_not);
  set("sydv", f.sydv); set("belediye", f.belediye);
  set("notlar", f.notlar); set("dosya_link", f.dosya_link);
  document.getElementById("medeni").value = f.medeni || "";
  // Talep checkboxları
  const talep = (f.talep || "").split(",").map(t => t.trim());
  document.getElementById("t_nakdi").checked   = talep.includes("Nakdi Yardım");
  document.getElementById("t_erzak").checked   = talep.includes("Erzak");
  document.getElementById("t_yasli").checked   = talep.includes("Yaşlı Bakım");
  document.getElementById("t_engelli").checked = talep.includes("Engelli");
  document.getElementById("t_evbakım").checked = talep.includes("Evde Bakım");
  document.getElementById("t_diger").checked   = talep.includes("Diğer");
  talepDegisti();
  // Araç / Tapu
  aracDurum = f.arac || "";
  tapuDurum = f.tapu || "";
  document.getElementById("arac-radio").querySelectorAll(".rad-btn").forEach(b => b.classList.remove("secili"));
  document.getElementById("tapu-radio").querySelectorAll(".rad-btn").forEach(b => b.classList.remove("secili"));
  if (f.arac) {
    const idx = f.arac === "var" ? 1 : 0;
    document.getElementById("arac-radio").querySelectorAll(".rad-btn")[idx]?.classList.add("secili");
    if (f.arac === "var") document.getElementById("arac-aciklama").classList.add("acik");
  }
  if (f.tapu) {
    const idx = f.tapu === "var" ? 1 : 0;
    document.getElementById("tapu-radio").querySelectorAll(".rad-btn")[idx]?.classList.add("secili");
    if (f.tapu === "var") document.getElementById("tapu-aciklama").classList.add("acik");
  }
  // SYDV / Belediye toggle
  sydvDurum = f.sydv_durum || ""; belDurum = f.bel_durum || "";
  ["sydv","bel"].forEach(tip => {
    const durum = tip === "sydv" ? sydvDurum : belDurum;
    const evetBtn  = document.getElementById(tip+"-evet");
    const hayirBtn = document.getElementById(tip+"-hayir");
    const alan     = document.getElementById(tip+"-alan");
    evetBtn.classList.toggle("active-evet",   durum==="evet");
    hayirBtn.classList.toggle("active-hayir", durum==="hayir");
    alan.classList.toggle("acik", durum==="evet");
  });
  // Foto reset
  fotoBlob = null; fotoImgbbLink = "";
  document.getElementById("foto-preview").style.display = "none";
  document.getElementById("foto-durum").style.display = "none";
  document.getElementById("foto-yazi").textContent = "Fotoğraf veya PDF seçmek için dokunun";
  document.getElementById("foto-ikon").textContent = "📎";
}

// ── KAYDET ──
async function kaydet() {
  const f = getForm();
  if (!f.ad_soyad) { mesaj("Adı Soyadı zorunludur!", false); return; }
  try {
    if (secili) {
      await col.doc(secili).update({ ...f, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      mesaj("✅ Güncellendi!");
    } else {
      const ref = await col.add({ ...f, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      secili = ref.id;
      document.getElementById("kaydet-label").textContent = "Güncelle";
      mesaj("✅ Kaydedildi!");
    }
    await yukle();
  } catch(err) { mesaj("Hata: " + err.message, false); }
}

// ── YENİ FORM ──
function yeniForm() {
  secili = null;
  setForm({ tarih: bugun() });
  document.getElementById("kaydet-label").textContent = "Kaydet";
  gosterTab("form");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ── AÇ ──
async function ac(id) {
  try {
    const snap = await col.doc(id).get();
    if (!snap.exists) { mesaj("Kayıt bulunamadı!", false); return; }
    secili = id;
    setForm(snap.data());
    document.getElementById("kaydet-label").textContent = "Güncelle";
    gosterTab("form");
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch(err) { mesaj("Hata: " + err.message, false); }
}

// ── SİL ──
async function sil(id) {
  if (!confirm("Bu kaydı silmek istediğinize emin misiniz?")) return;
  try {
    await col.doc(id).delete();
    if (secili === id) { secili = null; document.getElementById("kaydet-label").textContent = "Kaydet"; }
    await yukle(); renderListe();
    mesaj("🗑️ Silindi.");
  } catch(err) { mesaj("Hata: " + err.message, false); }
}

// ── TÜMÜNÜ SİL ──
async function tumunuSil() {
  if (!confirm("Tüm kayıtlar silinecek! Emin misiniz?")) return;
  try {
    const snap = await col.get();
    await Promise.all(snap.docs.map(d => d.ref.delete()));
    cache = []; secili = null; renderListe(); await yukle();
    mesaj("🗑️ Tüm kayıtlar silindi.");
  } catch(err) { mesaj("Hata: " + err.message, false); }
}

// ── SEÇİM ──
function tumunuSec() { cache.forEach(k => secilenler.add(k.id)); renderListe(); }
function secimiTemizle() { secilenler.clear(); renderListe(); }
function toggleSecim(id) { secilenler.has(id) ? secilenler.delete(id) : secilenler.add(id); renderListe(); }

// ── YÜKLE ──
async function yukle() {
  try {
    const snap = await col.orderBy("createdAt","desc").get();
    cache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const n = cache.length;
    const badge = document.getElementById("kayit-sayisi");
    badge.style.display = n > 0 ? "inline" : "none";
    badge.textContent = n;
    document.getElementById("btn-tumunu-sil").style.display = n > 0 ? "inline-flex" : "none";
  } catch(err) { console.error("Yükleme hatası:", err); }
}

// ── LİSTE RENDER ──
function renderListe() {
  const ara = (document.getElementById("arama")?.value || "").toLowerCase();
  const filtered = ara
    ? cache.filter(k => (k.ad_soyad+k.talep+k.notlar+k.gelir).toLowerCase().includes(ara))
    : cache;
  const el = document.getElementById("liste-konteyner");
  if (filtered.length === 0) {
    el.innerHTML = `<div class="liste-bos"><div class="liste-bos-ikon">📋</div><div>Kayıt yok</div><small>Form sekmesinden görüşme ekleyin</small></div>`;
    return;
  }
  el.innerHTML = filtered.map(k => `
    <div class="kayit-kart ${secilenler.has(k.id)?"secili-kart":""}">
      <div class="kayit-kart-ust">
        <div class="kayit-kart-ad">${escHtml(k.ad_soyad)}</div>
        <div class="kayit-kart-meta">
          <span>📅 ${tarihGoster(k.tarih)}</span>
          ${k.talep ? `<span>📌 ${escHtml(k.talep)}</span>` : ""}
          ${k.dosya_link ? `<a href="${escHtml(k.dosya_link)}" target="_blank" style="color:var(--gold)">📎 Belge</a>` : ""}
        </div>
        ${k.notlar ? `<div style="font-size:12px;color:var(--muted);margin-top:4px;">${escHtml(k.notlar.slice(0,80))}${k.notlar.length>80?"…":""}</div>` : ""}
      </div>
      <div class="kayit-kart-alt">
        <label class="seç-chk"><input type="checkbox" ${secilenler.has(k.id)?"checked":""} onchange="toggleSecim('${k.id}')"/> Seç</label>
        <button class="btn btn-primary btn-sm" onclick="ac('${k.id}')">✏️ Aç</button>
        <button class="btn btn-gold btn-sm" onclick="wordIndirById('${k.id}')">📄 Word</button>
        <button class="btn btn-red btn-sm" onclick="sil('${k.id}')">🗑️</button>
      </div>
    </div>`).join("");
}

// ── WORD (docx.js) ──
function satirOlustur(baslik, deger, bold=false) {
  const { Paragraph, TextRun } = docx;
  return new Paragraph({
    spacing: { before: 0, after: 80 },
    children: [
      new TextRun({ text: baslik + ": ", bold: true, size: 24, font: "Times New Roman" }),
      new TextRun({ text: deger || "-", bold: bold, size: 24, font: "Times New Roman" }),
    ]
  });
}
function bolumBasligi(baslik) {
  const { Paragraph, TextRun } = docx;
  return new Paragraph({
    spacing: { before: 160, after: 60 },
    children: [new TextRun({ text: baslik, bold: true, underline: {}, size: 24, font: "Times New Roman" })]
  });
}
function bosluk() {
  return new docx.Paragraph({ spacing: { before: 0, after: 60 }, children: [] });
}
function cokSatir(baslik, deger) {
  const { Paragraph, TextRun } = docx;
  const satirlar = (deger || "-").split("\n");
  const result = [];
  result.push(new Paragraph({
    spacing: { before: 0, after: 0 },
    children: [new TextRun({ text: baslik + ":", bold: true, size: 24, font: "Times New Roman" })]
  }));
  satirlar.forEach(s => {
    result.push(new Paragraph({
      spacing: { before: 0, after: 60 },
      indent: { left: 360 },
      children: [new TextRun({ text: s, size: 24, font: "Times New Roman" })]
    }));
  });
  return result;
}

async function wordIndir(data) {
  const f = data || getForm();
  if (!f.ad_soyad) { mesaj("Adı Soyadı zorunludur!", false); return; }
  if (!window.docx) { mesaj("DOCX kütüphanesi yüklenmedi!", false); return; }

  const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;

  const aracYazi = f.arac === "var" ? ("Araç Kaydı Var" + (f.arac_not ? ": " + f.arac_not : ""))
                 : f.arac === "yok" ? "Araç Kaydı Yok" : "-";
  const tapuYazi = f.tapu === "var" ? ("Tapu Kaydı Var" + (f.tapu_not ? ": " + f.tapu_not : ""))
                 : f.tapu === "yok" ? "Tapu Kaydı Yok" : "-";
  const sydvYazi = f.sydv_durum === "hayir" ? "SYDV Yardımı Yok"
                 : f.sydv_durum === "evet" ? ("SYDV Yardımı Var" + (f.sydv ? ": " + f.sydv : "")) : (f.sydv || "-");
  const belYazi  = f.bel_durum === "hayir" ? "Belediye Yardımı Yok"
                 : f.bel_durum === "evet" ? ("Belediye Yardımı Var" + (f.belediye ? ": " + f.belediye : "")) : (f.belediye || "-");

  const paragraflar = [
    // Başlık
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 80 },
      children: [new TextRun({ text: "T.C. KUŞADASI BELEDİYESİ", bold: true, size: 24, font: "Times New Roman" })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 80 },
      children: [new TextRun({ text: "SOSYAL YARDIM İŞLERİ MÜDÜRLÜĞÜ", bold: true, size: 24, font: "Times New Roman" })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 200 },
      children: [new TextRun({ text: "SOSYAL İNCELEME RAPORU", bold: true, size: 24, font: "Times New Roman" })] }),

    // Kişi Bilgileri
    bolumBasligi("KİŞİ BİLGİLERİ"),
    satirOlustur("Adı Soyadı", f.ad_soyad),
    satirOlustur("T.C. Kimlik No", f.tc),
    satirOlustur("Doğum Tarihi", tarihGoster(f.dogum)),
    satirOlustur("Medeni Durum", f.medeni),
    satirOlustur("Telefon", f.telefon),
    ...cokSatir("Adres", f.adres),

    // Başvuru
    bolumBasligi("BAŞVURU BİLGİLERİ"),
    satirOlustur("Görüşme Tarihi", tarihGoster(f.tarih)),
    satirOlustur("Başvuru No", f.basvuru_no),
    satirOlustur("Talep Edilen Yardım", f.talep),
    ...(f.diger_talep ? [satirOlustur("Diğer Talep", f.diger_talep)] : []),

    // Olayın Öyküsü
    bolumBasligi("OLAYIN ÖYKÜSÜ"),
    ...cokSatir("Evdeki Kişiler", f.kisi),
    ...cokSatir("Çalışma / Gelir Durumu", f.gelir),
    ...cokSatir("Sağlık / Engel Durumu", f.saglik),
    ...cokSatir("Konut / Kira / Borç", f.borc),

    // Değerlendirme
    bolumBasligi("DEĞERLENDİRME"),
    satirOlustur("Araç Kaydı", aracYazi),
    satirOlustur("Tapu Kaydı", tapuYazi),
    satirOlustur("SYDV Bilgisi", sydvYazi),
    satirOlustur("Belediye Geçmiş Yardımları", belYazi),
    ...(f.notlar ? cokSatir("Uzman Değerlendirmesi", f.notlar) : []),
    ...(f.dosya_link ? [satirOlustur("Belge Linki", f.dosya_link)] : []),

    // Sonuç
    bolumBasligi("SONUÇ"),
    new Paragraph({ spacing: { before: 0, after: 200 },
      children: [new TextRun({ text: "Sosyal inceleme sonucunda başvuru sahibinin durumu değerlendirilmiş olup gerekli yardımın yapılması uygun görülmektedir.", size: 24, font: "Times New Roman" })] }),

    // İmza
    bosluk(), bosluk(),
    new Paragraph({ spacing: { before: 0, after: 0 },
      children: [new TextRun({ text: "Görüşmeyi Yapan:", bold: true, size: 24, font: "Times New Roman" })] }),
    new Paragraph({ spacing: { before: 0, after: 0 },
      children: [new TextRun({ text: "Ozan Ersin DOĞAN", size: 24, font: "Times New Roman" })] }),
    new Paragraph({ spacing: { before: 0, after: 0 },
      children: [new TextRun({ text: "Sosyal Hizmet Uzmanı – Kuşadası Belediyesi", size: 24, font: "Times New Roman" })] }),
  ];

  const doc = new Document({
    sections: [{ properties: { page: { margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 } } }, children: paragraflar }]
  });

  try {
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (f.ad_soyad || "rapor").replace(/[^\w\sçğışöüÇĞİŞÖÜ]/g, "") + "_SIR.docx";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(err) { mesaj("DOCX hatası: " + err.message, false); console.error(err); }
}

async function wordIndirById(id) {
  try {
    const snap = await col.doc(id).get();
    if (snap.exists) wordIndir(snap.data());
  } catch(err) { mesaj("Hata: " + err.message, false); }
}

function secilenWordIndir() {
  if (secilenler.size === 0) { mesaj("Önce kayıt seçin!", false); return; }
  secilenler.forEach(id => {
    const k = cache.find(c => c.id === id);
    if (k) wordIndir(k);
  });
}

function appBaslat() {
  document.getElementById("tarih").value = bugun();
  yukle().then(() => {
    if (document.getElementById("page-liste").classList.contains("active")) renderListe();
  });
}

// Pin kontrol veya başlat
if (document.getElementById("app").style.display !== "none") {
  appBaslat();
}
