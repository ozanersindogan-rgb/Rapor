<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuşadası Belediyesi - SİR Görüşme Notu</title>
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #1e2a35; }
    header { background: linear-gradient(135deg, #1a3a5c, #2d5f8a); color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.2); }
    header .title-small { font-size: 10px; letter-spacing: 2px; opacity: .6; text-transform: uppercase; margin-bottom: 2px; }
    header h1 { font-family: Georgia, serif; font-size: 19px; font-weight: 600; }
    .tab-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tab-btn { background: rgba(255,255,255,.1); color: white; border: 1px solid rgba(255,255,255,.2); border-radius: 10px; padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; }
    .tab-btn.active { background: rgba(255,255,255,.25); }
    .badge { background: #f0c940; color: #333; border-radius: 20px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
    main { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
    .section { background: white; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; }
    .section-title { background: #1a3a5c; color: white; padding: 10px 18px; font-weight: 600; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
    .section-title span { opacity: .5; font-weight: 400; }
    .section-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 640px) { .row2 { grid-template-columns: 1fr; } }
    label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; display: block; }
    input, textarea { border: 1.5px solid #d1d9e0; border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: inherit; outline: none; width: 100%; background: white; color: #1e2a35; transition: border .15s; }
    input:focus, textarea:focus { border-color: #2d5f8a; }
    textarea { resize: vertical; min-height: 72px; line-height: 1.7; }
    #ad_soyad { font-size: 16px; font-weight: 600; }
    .btn-row, .liste-btns, .secim-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    .btn { border: none; border-radius: 10px; padding: 11px 22px; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .btn-navy { background: linear-gradient(135deg, #1a3a5c, #2d5f8a); color: white; }
    .btn-green { background: linear-gradient(135deg, #2d7a2d, #3d9a3d); color: white; }
    .btn-light { background: #e8f0f8; color: #1a3a5c; border: 1px solid #d1d9e0; }
    .btn-red { background: #fef2f2; color: #c0392b; border: 1px solid #fecaca; }
    .btn-gold { background: #fff7db; color: #7a5a00; border: 1px solid #f5de88; }
    .btn-sm { padding: 8px 14px; font-size: 12px; }
    .mesaj, .uyari { border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; margin-top: 12px; display: none; }
    .kayit-kart { background: white; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; border: 2px solid transparent; }
    .kayit-kart.secili { border-color: #2d5f8a; }
    .kayit-ust { padding: 14px 18px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .kayit-ad { font-weight: 700; font-size: 15px; color: #1a3a5c; }
    .kayit-alt { font-size: 12px; color: #64748b; margin-top: 3px; line-height: 1.5; }
    .kayit-not { padding: 10px 18px 12px; font-size: 12px; color: #64748b; border-top: 1px solid #f4f6f9; }
    .kayit-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .bos-mesaj { background: white; border-radius: 12px; padding: 40px; text-align: center; color: #64748b; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
    .liste-ust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .liste-baslik { font-family: Georgia, serif; font-size: 18px; color: #1a3a5c; font-weight: 600; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .login-card { width: 100%; max-width: 420px; background: white; border-radius: 16px; box-shadow: 0 10px 28px rgba(0,0,0,.12); overflow: hidden; }
    .login-head { background: linear-gradient(135deg, #1a3a5c, #2d5f8a); color: white; padding: 20px; }
    .login-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .checkbox-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    @media (max-width: 540px) { .checkbox-grid { grid-template-columns: 1fr; } }
    .check-card { border: 1.5px solid #d1d9e0; border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; background: #fff; }
    .check-card input { width: auto; }
    .ek-kutu { background: #f8fbff; border: 1px dashed #b9c8d8; border-radius: 10px; padding: 12px; }
    .kucuk { font-size: 12px; color: #64748b; }
    .dosya-link { word-break: break-all; }
    .secim-label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div id="login-screen" class="login-wrap">
    <div class="login-card">
      <div class="login-head">
        <div class="title-small">Kuşadası Belediyesi</div>
        <h1>SİR – Görüşme Notu</h1>
      </div>
      <div class="login-body">
        <div>
          <label for="login-password">Giriş Şifresi</label>
          <input type="password" id="login-password" placeholder="Şifre girin" />
        </div>
        <button class="btn btn-navy" onclick="girisYap()">🔐 Giriş Yap</button>
        <div id="login-mesaj" class="mesaj"></div>
      </div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <header>
      <div>
        <div class="title-small">Kuşadası Belediyesi</div>
        <h1>SİR – Görüşme Notu</h1>
      </div>
      <div class="tab-btns">
        <button id="btn-tab-form" class="tab-btn active" onclick="gosterTab('form')">✏️ Form</button>
        <button id="btn-tab-liste" class="tab-btn" onclick="gosterTab('liste')">📋 Kayıtlar <span class="badge" id="kayit-sayisi" style="display:none">0</span></button>
      </div>
    </header>

    <main>
      <div id="page-form">
        <div class="section">
          <div class="section-title">Kişi Bilgisi</div>
          <div class="section-body">
            <div>
              <label for="ad_soyad">Adı Soyadı *</label>
              <input id="ad_soyad" type="text" />
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Görüşme Bilgileri</div>
          <div class="section-body">
            <div class="row2">
              <div>
                <label for="tarih">Görüşme Tarihi</label>
                <input id="tarih" type="text" placeholder="GG.AA.YYYY" />
              </div>
              <div>
                <label for="talep_diger">Diğer Talep</label>
                <input id="talep_diger" type="text" placeholder="Varsa yazın" />
              </div>
            </div>

            <div>
              <label>Talep Edilen Yardım</label>
              <div class="checkbox-grid">
                <label class="check-card"><input type="checkbox" class="talep-check" value="Nakdi Yardım"> <span>Nakdi Yardım</span></label>
                <label class="check-card"><input type="checkbox" class="talep-check" value="Erzak"> <span>Erzak</span></label>
                <label class="check-card"><input type="checkbox" class="talep-check" value="Evde Bakım"> <span>Evde Bakım</span></label>
                <label class="check-card"><input type="checkbox" class="talep-check" value="Diğer"> <span>Diğer</span></label>
              </div>
            </div>

            <div>
              <label for="kisi">Evdeki Kişiler isim, yaş, ilişki</label>
              <textarea id="kisi"></textarea>
            </div>
            <div>
              <label for="gelir">Çalışma / Gelir Durumu</label>
              <textarea id="gelir"></textarea>
            </div>
            <div>
              <label for="saglik">Sağlık / Engel yoksa boş bırak</label>
              <textarea id="saglik"></textarea>
            </div>
            <div>
              <label for="borc">Konut / Kira / Borç</label>
              <textarea id="borc"></textarea>
            </div>
            <div>
              <label for="sydv">SYDV Bilgisi</label>
              <input id="sydv" type="text" />
            </div>
            <div>
              <label for="belediye">Belediye Geçmiş Yardımları</label>
              <textarea id="belediye"></textarea>
            </div>
            <div>
              <label for="diger">Diğer Notlar</label>
              <textarea id="diger"></textarea>
            </div>

            <div class="ek-kutu">
              <label for="foto_dosya">Fotoğraf Yükle (link oluşur)</label>
              <input id="foto_dosya" type="file" accept="image/*" />
              <div class="kucuk" style="margin-top:8px;">Fotoğraf ImgBB’ye yüklenir ve linki kayda eklenir.</div>
            </div>

            <div>
              <label for="dosya_link">PDF / Evrak Linki</label>
              <input id="dosya_link" type="url" placeholder="PDF veya başka evrak linki" />
            </div>

            <div id="upload-uyari" class="uyari"></div>
            <div id="form-mesaj" class="mesaj"></div>

            <div class="btn-row">
              <button class="btn btn-navy" onclick="kaydet()"><span id="kaydet-label">Kaydet</span></button>
              <button class="btn btn-light" onclick="kopyala()"><span id="kopya-label">📋 Notları Kopyala</span></button>
              <button class="btn btn-green" onclick="yeniForm()">➕ Yeni</button>
            </div>
          </div>
        </div>
      </div>

      <div id="page-liste" style="display:none;">
        <div class="liste-ust">
          <div class="liste-baslik">Kayıtlı Görüşmeler</div>
          <div class="liste-btns">
            <button class="btn btn-gold btn-sm" onclick="tumunuSec()">☑️ Tümünü Seç</button>
            <button class="btn btn-light btn-sm" onclick="secimiTemizle()">⬜ Seçimi Kaldır</button>
            <button class="btn btn-green btn-sm" onclick="secilenDosyalariIndir()">📥 Seçilen Dosyaları İndir</button>
            <button id="btn-tumunu-sil" class="btn btn-red btn-sm" onclick="tumunuSil()" style="display:none">🗑️ Tümünü Sil</button>
            <button class="btn btn-light btn-sm" onclick="yeniForm()">➕ Yeni Görüşme</button>
          </div>
        </div>
        <div id="liste-icerik"></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, getDocs, getDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const SIFRE = "ozanersin5752";
    const IMGBB_KEY = "a4bf9947bd3106b22e140266f63c713b";

    const firebaseConfig = {
      apiKey: "AIzaSyB9tYLbLRiY9HEfJQLQcyI5aij6wY2Qw_E",
      authDomain: "rapor-1192a.firebaseapp.com",
      projectId: "rapor-1192a",
      storageBucket: "rapor-1192a.firebasestorage.app",
      messagingSenderId: "880961076992",
      appId: "1:880961076992:web:7cd6e7e03c066e06c7fde5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const raporlarRef = collection(db, "raporlar");

    let secili = null;
    let cache = [];
    let secilenler = new Set();

    function bugun() {
      const t = new Date();
      return `${String(t.getDate()).padStart(2,"0")}.${String(t.getMonth()+1).padStart(2,"0")}.${t.getFullYear()}`;
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function parseTRDate(str) {
      if (!str) return 0;
      const m = String(str).match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
      if (!m) return 0;
      return new Date(`${m[3]}-${m[2]}-${m[1]}T00:00:00`).getTime();
    }

    function kayitSayisiGuncelle() {
      const n = cache.length;
      const badge = document.getElementById("kayit-sayisi");
      badge.style.display = n > 0 ? "inline" : "none";
      badge.textContent = n;
      document.getElementById("btn-tumunu-sil").style.display = n > 0 ? "inline-flex" : "none";
    }

    function seciliTalepGetir() {
      const secimler = [...document.querySelectorAll('.talep-check:checked')].map(x => x.value);
      const diger = document.getElementById('talep_diger').value.trim();
      if (diger) secimler.push(diger);
      return secimler;
    }

    function talepMetni(d) {
      const arr = Array.isArray(d.talep_liste) ? d.talep_liste.filter(Boolean) : [];
      if (arr.length) return arr.join(", ");
      return d.talep || "";
    }

    function setTalep(d) {
      const arr = Array.isArray(d.talep_liste) ? d.talep_liste : [];
      document.querySelectorAll('.talep-check').forEach(ch => {
        ch.checked = arr.includes(ch.value);
      });
      const bilinen = ["Nakdi Yardım", "Erzak", "Evde Bakım", "Diğer"];
      const serbest = arr.filter(x => !bilinen.includes(x));
      document.getElementById('talep_diger').value = serbest.join(', ');
    }

    function getForm() {
      return {
        ad_soyad: document.getElementById("ad_soyad").value.trim(),
        tarih: document.getElementById("tarih").value.trim(),
        talep: talepMetni({ talep_liste: seciliTalepGetir() }),
        talep_liste: seciliTalepGetir(),
        kisi: document.getElementById("kisi").value.trim(),
        gelir: document.getElementById("gelir").value.trim(),
        saglik: document.getElementById("saglik").value.trim(),
        borc: document.getElementById("borc").value.trim(),
        sydv: document.getElementById("sydv").value.trim(),
        belediye: document.getElementById("belediye").value.trim(),
        diger: document.getElementById("diger").value.trim(),
        dosya_link: document.getElementById("dosya_link").value.trim()
      };
    }

    function setForm(d) {
      ["ad_soyad","tarih","kisi","gelir","saglik","borc","sydv","belediye","diger","dosya_link"].forEach(k => {
        document.getElementById(k).value = d[k] || "";
      });
      setTalep(d || {});
      document.getElementById('foto_dosya').value = '';
    }

    function mesaj(metin, ok=true) {
      const el = document.getElementById("form-mesaj");
      el.textContent = metin;
      el.style.display = "block";
      el.style.background = ok ? "#d1fae5" : "#fef2f2";
      el.style.border = `1.5px solid ${ok ? "#6ee7b7" : "#fecaca"}`;
      el.style.color = ok ? "#065f46" : "#c0392b";
      setTimeout(() => el.style.display = "none", 3000);
    }

    function uploadMesaj(metin, ok=true) {
      const el = document.getElementById("upload-uyari");
      if (!metin) {
        el.style.display = 'none';
        el.textContent = '';
        return;
      }
      el.textContent = metin;
      el.style.display = 'block';
      el.style.background = ok ? '#eff6ff' : '#fff7ed';
      el.style.border = `1.5px solid ${ok ? '#bfdbfe' : '#fed7aa'}`;
      el.style.color = ok ? '#1d4ed8' : '#c2410c';
    }

    async function imgbbYukle(file) {
      const fd = new FormData();
      fd.append('image', file);
      fd.append('name', file.name);
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
        method: 'POST',
        body: fd
      });
      const data = await res.json();
      if (!res.ok || !data.success) {
        throw new Error(data?.error?.message || 'Fotoğraf yüklenemedi');
      }
      return data.data.url;
    }

    async function verileriYukle() {
      const q = query(raporlarRef, orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      cache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      cache.sort((a, b) => parseTRDate(b.tarih) - parseTRDate(a.tarih) || ((b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
      kayitSayisiGuncelle();
      if (document.getElementById("page-liste").style.display !== "none") renderListe();
    }

    async function kaydet() {
      const form = getForm();
      if (!form.ad_soyad) { mesaj("Adı Soyadı zorunludur!", false); return; }
      try {
        const fotoInput = document.getElementById('foto_dosya');
        const file = fotoInput.files?.[0];
        if (file) {
          uploadMesaj('Fotoğraf yükleniyor, lütfen bekleyin...');
          const fotoLink = await imgbbYukle(file);
          form.dosya_link = fotoLink;
          document.getElementById('dosya_link').value = fotoLink;
          uploadMesaj('Fotoğraf yüklendi, link kayda eklendi.');
        } else {
          uploadMesaj('');
        }

        if (secili !== null) {
          const ref = doc(db, "raporlar", secili);
          await updateDoc(ref, { ...form, updatedAt: serverTimestamp() });
          mesaj("✅ Güncellendi!");
        } else {
          const ref = await addDoc(raporlarRef, { ...form, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
          secili = ref.id;
          document.getElementById("kaydet-label").textContent = "Güncelle";
          mesaj("✅ Kaydedildi!");
        }
        await verileriYukle();
      } catch (err) {
        console.error(err);
        uploadMesaj('');
        mesaj("Kayıt sırasında hata oluştu: " + err.message, false);
      }
    }

    function kopyala() {
      const f = getForm();
      const metin = [
        "=== GÖRÜŞME NOTLARI ===",
        f.ad_soyad ? `Ad Soyad: ${f.ad_soyad}` : "",
        f.tarih ? `Görüşme Tarihi: ${f.tarih}` : "",
        f.talep ? `Talep: ${f.talep}` : "",
        f.kisi ? `\nEvdeki kişiler:\n${f.kisi}` : "",
        f.gelir ? `\nGelir durumu:\n${f.gelir}` : "",
        f.saglik ? `\nSağlık durumu:\n${f.saglik}` : "",
        f.borc ? `\nKonut/Borç:\n${f.borc}` : "",
        f.sydv ? `\nSYDV: ${f.sydv}` : "",
        `\nBelediye yardımları: ${f.belediye || "Yakın zamanda yardım almadığı gözlemlenmiştir."}`,
        f.diger ? `\nDiğer notlar:\n${f.diger}` : "",
        f.dosya_link ? `\nDosya Linki: ${f.dosya_link}` : "",
      ].filter(Boolean).join("\n");

      navigator.clipboard.writeText(metin).then(() => {
        const lbl = document.getElementById("kopya-label");
        lbl.textContent = "✅ Kopyalandı!";
        setTimeout(() => lbl.textContent = "📋 Notları Kopyala", 2500);
      }).catch(() => {
        mesaj("Kopyalama başarısız oldu.", false);
      });
    }

    function yeniForm() {
      secili = null;
      setForm({ tarih: bugun(), talep_liste: [] });
      document.getElementById("kaydet-label").textContent = "Kaydet";
      uploadMesaj('');
      gosterTab("form");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function ac(id) {
      try {
        const ref = doc(db, "raporlar", id);
        const snap = await getDoc(ref);
        if (!snap.exists()) { mesaj("Kayıt bulunamadı.", false); return; }
        secili = id;
        setForm(snap.data());
        document.getElementById("kaydet-label").textContent = "Güncelle";
        gosterTab("form");
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (err) {
        console.error(err);
        mesaj("Kayıt açılamadı: " + err.message, false);
      }
    }

    async function sil(id) {
      try {
        await deleteDoc(doc(db, "raporlar", id));
        secilenler.delete(id);
        if (secili === id) {
          secili = null;
          setForm({ tarih: bugun(), talep_liste: [] });
          document.getElementById("kaydet-label").textContent = "Kaydet";
        }
        await verileriYukle();
      } catch (err) {
        console.error(err);
        mesaj("Kayıt silinemedi: " + err.message, false);
      }
    }

    async function tumunuSil() {
      if (!confirm("Tüm kayıtlar silinsin mi?")) return;
      try {
        const snap = await getDocs(raporlarRef);
        await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
        secili = null;
        secilenler.clear();
        setForm({ tarih: bugun(), talep_liste: [] });
        document.getElementById("kaydet-label").textContent = "Kaydet";
        await verileriYukle();
      } catch (err) {
        console.error(err);
        mesaj("Tüm kayıtlar silinemedi: " + err.message, false);
      }
    }

    function toggleSecim(id, checked) {
      if (checked) secilenler.add(id); else secilenler.delete(id);
    }

    function tumunuSec() {
      cache.forEach(k => secilenler.add(k.id));
      renderListe();
    }

    function secimiTemizle() {
      secilenler.clear();
      renderListe();
    }

    async function secilenDosyalariIndir() {
      const secilenKayitlar = cache.filter(k => secilenler.has(k.id) && k.dosya_link);
      if (!secilenKayitlar.length) {
        alert('İndirilecek seçili dosya bulunamadı.');
        return;
      }
      const zip = new JSZip();
      let basarili = 0;
      for (const kayit of secilenKayitlar) {
        try {
          const res = await fetch(kayit.dosya_link);
          if (!res.ok) throw new Error('Dosya alınamadı');
          const blob = await res.blob();
          const ext = blob.type.includes('png') ? '.png' : blob.type.includes('jpeg') ? '.jpg' : blob.type.includes('webp') ? '.webp' : '.bin';
          const ad = (kayit.ad_soyad || 'dosya').replace(/[\\/:*?"<>|]/g, '_');
          zip.file(`${ad}${ext}`, blob);
          basarili++;
        } catch (e) {
          console.warn('İndirilemeyen dosya:', kayit.dosya_link, e);
        }
      }
      if (!basarili) {
        alert('Seçilen dosyalar indirilemedi. Linkleri tek tek açmayı deneyin.');
        return;
      }
      const content = await zip.generateAsync({ type: 'blob' });
      saveAs(content, 'secilen_dosyalar.zip');
    }

    async function wordIndir(k) {
      try {
        const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;
        const belge = new Document({
          sections: [{
            properties: {},
            children: [
              new Paragraph({ heading: HeadingLevel.HEADING_1, children: [new TextRun({ text: 'KUŞADASI BELEDİYESİ', bold: true })] }),
              new Paragraph({ heading: HeadingLevel.HEADING_2, children: [new TextRun({ text: 'SİR - Görüşme Notu', bold: true })] }),
              new Paragraph(''),
              new Paragraph({ children: [new TextRun({ text: 'Ad Soyad: ', bold: true }), new TextRun(k.ad_soyad || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'Görüşme Tarihi: ', bold: true }), new TextRun(k.tarih || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'Talep Edilen Yardım: ', bold: true }), new TextRun(talepMetni(k))] }),
              new Paragraph({ children: [new TextRun({ text: 'Evdeki Kişiler: ', bold: true }), new TextRun(k.kisi || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'Çalışma / Gelir Durumu: ', bold: true }), new TextRun(k.gelir || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'Sağlık / Engel: ', bold: true }), new TextRun(k.saglik || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'Konut / Kira / Borç: ', bold: true }), new TextRun(k.borc || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'SYDV Bilgisi: ', bold: true }), new TextRun(k.sydv || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'Belediye Geçmiş Yardımları: ', bold: true }), new TextRun(k.belediye || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'Diğer Notlar: ', bold: true }), new TextRun(k.diger || '')] }),
              new Paragraph({ children: [new TextRun({ text: 'Dosya Linki: ', bold: true }), new TextRun(k.dosya_link || '')] })
            ]
          }]
        });
        const blob = await Packer.toBlob(belge);
        const ad = (k.ad_soyad || 'rapor').replace(/[\\/:*?"<>|]/g, '_');
        saveAs(blob, `${ad}_Rapor.docx`);
      } catch (err) {
        console.error(err);
        alert('Word dosyası oluşturulamadı: ' + err.message);
      }
    }

    function renderListe() {
      kayitSayisiGuncelle();
      const liste = cache;
      const el = document.getElementById("liste-icerik");
      if (liste.length === 0) {
        el.innerHTML = `<div class="bos-mesaj"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-weight:600">Henüz kayıt yok</div><div style="font-size:13px;margin-top:6px">Form sekmesinden görüşme notu ekleyin</div></div>`;
        return;
      }
      el.innerHTML = liste.map(k => `
        <div class="kayit-kart ${secili === k.id ? 'secili' : ''}">
          <div class="kayit-ust">
            <div>
              <label class="secim-label"><input type="checkbox" ${secilenler.has(k.id) ? 'checked' : ''} onchange="toggleSecim('${k.id}', this.checked)"> Seç</label>
              <div class="kayit-ad">${escapeHtml(k.ad_soyad)}</div>
              <div class="kayit-alt">${k.tarih ? "📅 " + escapeHtml(k.tarih) : ""}${talepMetni(k) ? "&nbsp;&nbsp;📌 " + escapeHtml(talepMetni(k)) : ""}</div>
              ${k.dosya_link ? `<div class="kayit-alt dosya-link">📎 <a href="${escapeHtml(k.dosya_link)}" target="_blank" rel="noopener noreferrer">Dosyayı Aç</a></div>` : ''}
            </div>
            <div class="kayit-btns">
              <button class="btn btn-navy btn-sm" onclick="ac('${k.id}')">✏️ Aç</button>
              <button class="btn btn-green btn-sm" onclick='wordIndir(${JSON.stringify(k).replace(/'/g, "&#39;")})'>📄 Word</button>
              <button class="btn btn-red btn-sm" onclick="sil('${k.id}')">🗑️</button>
            </div>
          </div>
          ${k.kisi ? `<div class="kayit-not">${escapeHtml(String(k.kisi).split("\n")[0])}</div>` : ""}
        </div>`).join("");
    }

    function gosterTab(tab) {
      document.getElementById("page-form").style.display = tab === "form" ? "block" : "none";
      document.getElementById("page-liste").style.display = tab === "liste" ? "block" : "none";
      document.getElementById("btn-tab-form").classList.toggle("active", tab === "form");
      document.getElementById("btn-tab-liste").classList.toggle("active", tab === "liste");
      if (tab === "liste") renderListe();
    }

    function girisYap() {
      const sifre = document.getElementById('login-password').value;
      if (sifre !== SIFRE) {
        const el = document.getElementById('login-mesaj');
        el.textContent = 'Şifre yanlış.';
        el.style.display = 'block';
        el.style.background = '#fef2f2';
        el.style.border = '1.5px solid #fecaca';
        el.style.color = '#c0392b';
        return;
      }
      sessionStorage.setItem('sir_login_ok', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    if (sessionStorage.getItem('sir_login_ok') === '1') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    window.kaydet = kaydet;
    window.kopyala = kopyala;
    window.yeniForm = yeniForm;
    window.ac = ac;
    window.sil = sil;
    window.tumunuSil = tumunuSil;
    window.gosterTab = gosterTab;
    window.girisYap = girisYap;
    window.tumunuSec = tumunuSec;
    window.secimiTemizle = secimiTemizle;
    window.toggleSecim = toggleSecim;
    window.wordIndir = wordIndir;
    window.secilenDosyalariIndir = secilenDosyalariIndir;

    document.getElementById("tarih").value = bugun();
    verileriYukle();
  </script>
</body>
</html>
