<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sosyal Yardım Formu</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f7fb;
      color: #222;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h1, h2 {
      margin-top: 0;
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 700px) {
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfd6e4;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    button {
      border: 0;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .btn-primary {
      background: #0d6efd;
      color: #fff;
    }
    .btn-danger {
      background: #dc3545;
      color: #fff;
    }
    .btn-secondary {
      background: #6c757d;
      color: #fff;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .msg {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
    }
    .ok {
      background: #d1e7dd;
      color: #0f5132;
      display: block;
    }
    .err {
      background: #f8d7da;
      color: #842029;
      display: block;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
    .toolbar input {
      max-width: 320px;
      background: #fff;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      padding: 10px 8px;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      background: #f8f9fc;
      position: sticky;
      top: 0;
    }
    .small {
      font-size: 12px;
      opacity: 0.8;
    }
    .empty {
      padding: 14px;
      background: #fff8db;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Sosyal Yardım Başvuru Formu</h1>
      <div class="small">Kayıtlar Firebase üzerinde saklanır. Bu yüzden her cihazdan görünür.</div>
    </div>

    <div class="card">
      <h2>Yeni Kayıt</h2>

      <form id="kayitFormu">
        <div class="grid grid-2">
          <div>
            <label for="ad_soyad">Ad Soyad</label>
            <input type="text" id="ad_soyad" required />
          </div>

          <div>
            <label for="tarih">Tarih</label>
            <input type="date" id="tarih" />
          </div>

          <div>
            <label for="talep">Talep</label>
            <input type="text" id="talep" />
          </div>

          <div>
            <label for="kisi">Kişi Sayısı</label>
            <input type="number" id="kisi" min="0" />
          </div>

          <div>
            <label for="gelir">Gelir Durumu</label>
            <input type="text" id="gelir" />
          </div>

          <div>
            <label for="saglik">Sağlık Durumu</label>
            <input type="text" id="saglik" />
          </div>

          <div>
            <label for="borc">Borç Durumu</label>
            <input type="text" id="borc" />
          </div>

          <div>
            <label for="sydv">SYDV</label>
            <input type="text" id="sydv" />
          </div>

          <div>
            <label for="belediye">Belediye Yardımı</label>
            <input type="text" id="belediye" />
          </div>

          <div>
            <label for="diger">Diğer</label>
            <input type="text" id="diger" />
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="aciklama">Açıklama</label>
          <textarea id="aciklama"></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary">Kaydet</button>
          <button type="button" class="btn-secondary" id="temizleBtn">Formu Temizle</button>
        </div>

        <div id="mesaj" class="msg"></div>
      </form>
    </div>

    <div class="card">
      <h2>Kayıtlar</h2>

      <div class="toolbar">
        <input type="text" id="arama" placeholder="Ad soyad veya talep ara..." />
      </div>

      <div id="kayitSayisi" class="small" style="margin-bottom:10px;"></div>

      <div id="bosMesaj" class="empty" style="display:none;">
        Henüz kayıt yok.
      </div>

      <div class="table-wrap">
        <table id="kayitTablosu">
          <thead>
            <tr>
              <th>Tarih</th>
              <th>Ad Soyad</th>
              <th>Talep</th>
              <th>Kişi</th>
              <th>Gelir</th>
              <th>Sağlık</th>
              <th>Borç</th>
              <th>SYDV</th>
              <th>Belediye</th>
              <th>Diğer</th>
              <th>Açıklama</th>
              <th>İşlem</th>
            </tr>
          </thead>
          <tbody id="kayitlarBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy,
      deleteDoc,
      doc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9tYLbLRiY9HEfJQLQcyI5aij6wY2Qw_E",
      authDomain: "rapor-1192a.firebaseapp.com",
      projectId: "rapor-1192a",
      storageBucket: "rapor-1192a.firebasestorage.app",
      messagingSenderId: "880961076992",
      appId: "1:880961076992:web:7cd6e7e03c066e06c7fde5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const raporlarRef = collection(db, "raporlar");

    const kayitFormu = document.getElementById("kayitFormu");
    const mesajEl = document.getElementById("mesaj");
    const kayitlarBody = document.getElementById("kayitlarBody");
    const kayitSayisi = document.getElementById("kayitSayisi");
    const bosMesaj = document.getElementById("bosMesaj");
    const aramaInput = document.getElementById("arama");
    const temizleBtn = document.getElementById("temizleBtn");

    let tumKayitlar = [];

    function mesajYaz(text, ok = true) {
      mesajEl.textContent = text;
      mesajEl.className = "msg " + (ok ? "ok" : "err");
    }

    function mesajiTemizle() {
      mesajEl.textContent = "";
      mesajEl.className = "msg";
    }

    function bugunVarsayilan() {
      const now = new Date();
      const yil = now.getFullYear();
      const ay = String(now.getMonth() + 1).padStart(2, "0");
      const gun = String(now.getDate()).padStart(2, "0");
      return `${yil}-${ay}-${gun}`;
    }

    function formTemizle() {
      kayitFormu.reset();
      document.getElementById("tarih").value = bugunVarsayilan();
      mesajiTemizle();
    }

    function getFormData() {
      return {
        ad_soyad: document.getElementById("ad_soyad").value.trim(),
        tarih: document.getElementById("tarih").value.trim(),
        talep: document.getElementById("talep").value.trim(),
        kisi: document.getElementById("kisi").value.trim(),
        gelir: document.getElementById("gelir").value.trim(),
        saglik: document.getElementById("saglik").value.trim(),
        borc: document.getElementById("borc").value.trim(),
        sydv: document.getElementById("sydv").value.trim(),
        belediye: document.getElementById("belediye").value.trim(),
        diger: document.getElementById("diger").value.trim(),
        aciklama: document.getElementById("aciklama").value.trim()
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function filtrelenmisKayitlar() {
      const q = aramaInput.value.trim().toLowerCase();
      if (!q) return tumKayitlar;
      return tumKayitlar.filter(k => {
        const ad = (k.ad_soyad || "").toLowerCase();
        const talep = (k.talep || "").toLowerCase();
        return ad.includes(q) || talep.includes(q);
      });
    }

    function tabloyuBas(kayitlar) {
      kayitlarBody.innerHTML = "";

      if (!kayitlar.length) {
        bosMesaj.style.display = "block";
        kayitSayisi.textContent = "Toplam kayıt: 0";
        return;
      }

      bosMesaj.style.display = "none";
      kayitSayisi.textContent = `Toplam kayıt: ${kayitlar.length}`;

      for (const kayit of kayitlar) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(kayit.tarih)}</td>
          <td>${escapeHtml(kayit.ad_soyad)}</td>
          <td>${escapeHtml(kayit.talep)}</td>
          <td>${escapeHtml(kayit.kisi)}</td>
          <td>${escapeHtml(kayit.gelir)}</td>
          <td>${escapeHtml(kayit.saglik)}</td>
          <td>${escapeHtml(kayit.borc)}</td>
          <td>${escapeHtml(kayit.sydv)}</td>
          <td>${escapeHtml(kayit.belediye)}</td>
          <td>${escapeHtml(kayit.diger)}</td>
          <td>${escapeHtml(kayit.aciklama)}</td>
          <td>
            <button class="btn-danger" data-id="${escapeHtml(kayit.id)}">Sil</button>
          </td>
        `;
        kayitlarBody.appendChild(tr);
      }

      kayitlarBody.querySelectorAll(".btn-danger").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const onay = confirm("Bu kaydı silmek istiyor musun?");
          if (!onay) return;

          try {
            await deleteDoc(doc(db, "raporlar", id));
            mesajYaz("Kayıt silindi.");
          } catch (err) {
            console.error(err);
            mesajYaz("Kayıt silinemedi: " + err.message, false);
          }
        });
      });
    }

    kayitFormu.addEventListener("submit", async (e) => {
      e.preventDefault();
      mesajiTemizle();

      const form = getFormData();

      if (!form.ad_soyad) {
        mesajYaz("Ad Soyad zorunludur.", false);
        return;
      }

      try {
        await addDoc(raporlarRef, {
          ...form,
          createdAt: serverTimestamp()
        });

        mesajYaz("Kayıt başarıyla eklendi.");
        formTemizle();
      } catch (err) {
        console.error(err);
        mesajYaz("Kayıt eklenemedi: " + err.message, false);
      }
    });

    temizleBtn.addEventListener("click", formTemizle);
    aramaInput.addEventListener("input", () => tabloyuBas(filtrelenmisKayitlar()));

    document.getElementById("tarih").value = bugunVarsayilan();

    const q = query(raporlarRef, orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
      tumKayitlar = snapshot.docs.map(d => ({
        id: d.id,
        ...d.data()
      }));
      tabloyuBas(filtrelenmisKayitlar());
    }, (err) => {
      console.error(err);
      mesajYaz("Kayıtlar yüklenemedi: " + err.message, false);
    });
  </script>
</body>
</html>
