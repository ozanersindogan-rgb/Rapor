<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SİR – Görüşme Notu</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #1e2a35; }

header {
  background: linear-gradient(135deg, #1a3a5c, #2d5f8a);
  color: white; padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
header .title-small { font-size: 10px; letter-spacing: 2px; opacity: .6; text-transform: uppercase; margin-bottom: 2px; }
header h1 { font-family: Georgia, serif; font-size: 19px; font-weight: 600; }
.tab-btns { display: flex; gap: 8px; align-items: center; }
.tab-btn {
  background: rgba(255,255,255,.1); color: white;
  border: 1px solid rgba(255,255,255,.2); border-radius: 10px;
  padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 5px;
}
.tab-btn.active { background: rgba(255,255,255,.25); }
.badge { background: #f0c940; color: #333; border-radius: 20px; padding: 1px 7px; font-size: 10px; font-weight: 700; }

main { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }

.section { background: white; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; }
.section-title { background: #1a3a5c; color: white; padding: 10px 18px; font-weight: 600; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
.section-title span { opacity: .5; font-weight: 400; }
.section-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; display: block; }
input, textarea, select {
  border: 1.5px solid #d1d9e0; border-radius: 8px; padding: 9px 12px;
  font-size: 13px; font-family: inherit; outline: none; width: 100%;
  background: white; color: #1e2a35; transition: border .15s;
}
input:focus, textarea:focus, select:focus { border-color: #2d5f8a; }
textarea { resize: vertical; min-height: 72px; line-height: 1.7; }
#ad_soyad { font-size: 16px; font-weight: 600; }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.btn { border: none; border-radius: 10px; padding: 11px 22px; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn-navy  { background: linear-gradient(135deg, #1a3a5c, #2d5f8a); color: white; }
.btn-green { background: linear-gradient(135deg, #2d7a2d, #3d9a3d); color: white; }
.btn-light { background: #e8f0f8; color: #1a3a5c; border: 1px solid #d1d9e0; }
.btn-red   { background: #fef2f2; color: #c0392b; border: 1px solid #fecaca; }
.btn-sm    { padding: 8px 14px; font-size: 12px; }

.mesaj { border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; margin-top: 12px; display: none; }

.kayit-kart { background: white; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; border: 2px solid transparent; }
.kayit-kart.secili { border-color: #2d5f8a; }
.kayit-ust { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
.kayit-ad  { font-weight: 700; font-size: 15px; color: #1a3a5c; }
.kayit-alt { font-size: 12px; color: #64748b; margin-top: 3px; }
.kayit-not { padding: 10px 18px 12px; font-size: 12px; color: #64748b; border-top: 1px solid #f4f6f9; }
.kayit-btns { display: flex; gap: 8px; }

.bos-mesaj { background: white; border-radius: 12px; padding: 40px; text-align: center; color: #64748b; box-shadow: 0 1px 6px rgba(0,0,0,.07); }

.liste-ust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.liste-baslik { font-family: Georgia, serif; font-size: 18px; color: #1a3a5c; font-weight: 600; }
.liste-btns { display: flex; gap: 8px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="title-small">Kuşadası Belediyesi</div>
    <h1>SİR – Görüşme Notu</h1>
  </div>
  <div class="tab-btns">
    <button class="tab-btn active" id="btn-tab-form" onclick="gosterTab('form')">✏️ Form</button>
    <button class="tab-btn" id="btn-tab-liste" onclick="gosterTab('liste')">
      📋 Kayıtlar <span class="badge" id="kayit-sayisi" style="display:none">0</span>
    </button>
  </div>
</header>

<!-- FORM -->
<div id="page-form">
<main>
  <div class="section">
    <div class="section-title">Kişi Bilgisi</div>
    <div class="section-body">
      <div><label>Adı Soyadı *</label><input id="ad_soyad" placeholder="AHMET YILMAZ"/></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Görüşme Bilgileri</div>
    <div class="section-body">
      <div class="row2">
        <div><label>Görüşme Tarihi</label><input id="tarih" placeholder="01.01.2026"/></div>
        <div>
          <label>Talep Edilen Yardım</label>
          <div class="checkbox-grid">
            <label class="check-card"><input type="checkbox" id="yardim_nakdi"> <span>Nakdi Yardım</span></label>
            <label class="check-card"><input type="checkbox" id="yardim_erzak"> <span>Erzak</span></label>
            <label class="check-card"><input type="checkbox" id="yardim_evdebakim"> <span>Evde Bakım</span></label>
            <label class="check-card"><input type="checkbox" id="yardim_diger_chk"> <span>Diğer</span></label>
          </div>
        </div>
        <div id="talep-diger-wrap" style="display:none">
          <label for="yardim_diger_text">Diğer Talep</label>
          <input id="yardim_diger_text" placeholder="Sadece diğer seçilirse yazın"/>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Evdeki Kişiler <span>isim, yaş, ilişki</span></div>
    <div class="section-body">
      <textarea id="kisi" placeholder="Eşi Mehmet 55 yaş&#10;2 çocuk – 10 ve 14 yaş"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Çalışma / Gelir Durumu</div>
    <div class="section-body">
      <textarea id="gelir" placeholder="Çalışmıyor&#10;Eşi 5.390 TL yaşlılık aylığı alıyor"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sağlık / Engel <span>yoksa boş bırak</span></div>
    <div class="section-body">
      <textarea id="saglik" placeholder="%80 engelli, akülü sandalye kullanıyor"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Konut / Kira / Borç</div>
    <div class="section-body">
      <textarea id="borc" placeholder="Kira 8.000 TL, kira borcu yok&#10;Elektrik borcu 1.500 TL"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Değerlendirme ve Ekler</div>
    <div class="section-body">
      <div class="row2">
        <div>
          <label for="arac_durum">Araç Kaydı</label>
          <select id="arac_durum">
            <option value="">Seçiniz</option>
            <option value="yok">Araç kaydı yok</option>
            <option value="var">Araç kaydı var</option>
          </select>
        </div>
        <div>
          <label for="tapu_durum">Tapu Kaydı</label>
          <select id="tapu_durum">
            <option value="">Seçiniz</option>
            <option value="yok">Tapu kaydı yok</option>
            <option value="var">Tapu kaydı var</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div id="arac_detay_wrap" style="display:none">
          <label for="arac_detay">Araç Kaydı Detayı</label>
          <textarea id="arac_detay" placeholder="Araç bilgilerini yazın"></textarea>
        </div>
        <div id="tapu_detay_wrap" style="display:none">
          <label for="tapu_detay">Tapu Kaydı Detayı</label>
          <textarea id="tapu_detay" placeholder="Tapu / taşınmaz bilgilerini yazın"></textarea>
        </div>
      </div>
      <div class="row2">
        <div>
          <label for="sydv_durum">SYDV Bilgisi</label>
          <select id="sydv_durum">
            <option value="">Seçiniz</option>
            <option value="yok">SYDV bilgisi yok</option>
            <option value="var">SYDV bilgisi var</option>
          </select>
        </div>
        <div>
          <label for="belediye_durum">Belediye Geçmiş Yardımları</label>
          <select id="belediye_durum">
            <option value="">Seçiniz</option>
            <option value="yok">Yardım yok</option>
            <option value="var">Yardım var</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div id="sydv_detay_wrap" style="display:none">
          <label for="sydv">SYDV Detayı</label>
          <textarea id="sydv" placeholder="SYDV bilgisini yazın"></textarea>
        </div>
        <div id="belediye_detay_wrap" style="display:none">
          <label for="belediye">Belediye Yardım Detayı</label>
          <textarea id="belediye" placeholder="Geçmiş yardım bilgisini yazın"></textarea>
        </div>
      </div>
      <div><label>Diğer Notlar</label><textarea id="diger" placeholder="Diğer önemli bilgiler..."></textarea></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-green" onclick="kaydet()">💾 <span id="kaydet-label">Kaydet</span></button>
    <button class="btn btn-navy"  onclick="kopyala()"><span id="kopya-label">📋 Notları Kopyala</span></button>
    <button class="btn btn-light" onclick="yeniForm()">➕ Yeni</button>
  </div>
  <div class="mesaj" id="form-mesaj"></div>
</main>
</div>

<!-- LİSTE -->
<div id="page-liste" style="display:none">
<main>
  <div class="liste-ust">
    <div class="liste-baslik">Kayıtlı Görüşmeler</div>
    <div class="liste-btns">
      <button class="btn btn-red btn-sm" id="btn-tumunu-sil" onclick="tumunuSil()" style="display:none">🗑️ Tümünü Sil</button>
      <button class="btn btn-green btn-sm" onclick="yeniForm()">➕ Yeni Görüşme</button>
    </div>
  </div>
  <div id="liste-icerik"></div>
</main>
</div>

<script>
const STORAGE_KEY = "sir_gorusme_notlari";
let secili = null;

function bugun() {
  const t = new Date();
  return `${String(t.getDate()).padStart(2,"0")}.${String(t.getMonth()+1).padStart(2,"0")}.${t.getFullYear()}`;
}
function yukle() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
}
function kaydet_depo(liste) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(liste));
  const n = liste.length;
  const badge = document.getElementById("kayit-sayisi");
  badge.style.display = n > 0 ? "inline" : "none";
  badge.textContent = n;
  document.getElementById("btn-tumunu-sil").style.display = n > 0 ? "inline-flex" : "none";
}
function talepSecimleriniAl() {
  const list = [];
  if (document.getElementById("yardim_nakdi").checked) list.push("Nakdi Yardım");
  if (document.getElementById("yardim_erzak").checked) list.push("Erzak");
  if (document.getElementById("yardim_evdebakim").checked) list.push("Evde Bakım");
  if (document.getElementById("yardim_diger_chk").checked) {
    const diger = document.getElementById("yardim_diger_text").value.trim();
    list.push(diger ? `Diğer: ${diger}` : "Diğer");
  }
  return list;
}
function talepYazdir(list) { return (list || []).join(", "); }
function talepSecimleriniSetEt(list) {
  const joined = Array.isArray(list) ? list.join(" | ") : String(list || "");
  document.getElementById("yardim_nakdi").checked = joined.includes("Nakdi Yardım");
  document.getElementById("yardim_erzak").checked = joined.includes("Erzak");
  document.getElementById("yardim_evdebakim").checked = joined.includes("Evde Bakım");
  const digerItem = Array.isArray(list) ? list.find(x => String(x).startsWith("Diğer")) : "";
  document.getElementById("yardim_diger_chk").checked = !!digerItem;
  document.getElementById("yardim_diger_text").value = digerItem ? String(digerItem).replace(/^Diğer:\s*/, "") : "";
  talepDigerGuncelle();
}
function talepDigerGuncelle() {
  document.getElementById("talep-diger-wrap").style.display = document.getElementById("yardim_diger_chk").checked ? "block" : "none";
}
function durumDetayGuncelle(selectId, wrapId, textareaId) {
  const val = document.getElementById(selectId).value;
  const wrap = document.getElementById(wrapId);
  const textarea = document.getElementById(textareaId);
  wrap.style.display = val === "var" ? "block" : "none";
  if (val !== "var") textarea.value = "";
}
function getForm() {
  return {
    ad_soyad: document.getElementById("ad_soyad").value.trim(),
    tarih: document.getElementById("tarih").value.trim(),
    talepListe: talepSecimleriniAl(),
    talep: talepYazdir(talepSecimleriniAl()),
    kisi: document.getElementById("kisi").value.trim(),
    gelir: document.getElementById("gelir").value.trim(),
    saglik: document.getElementById("saglik").value.trim(),
    borc: document.getElementById("borc").value.trim(),
    arac_durum: document.getElementById("arac_durum").value,
    arac_detay: document.getElementById("arac_detay").value.trim(),
    tapu_durum: document.getElementById("tapu_durum").value,
    tapu_detay: document.getElementById("tapu_detay").value.trim(),
    sydv_durum: document.getElementById("sydv_durum").value,
    sydv: document.getElementById("sydv").value.trim(),
    belediye_durum: document.getElementById("belediye_durum").value,
    belediye: document.getElementById("belediye").value.trim(),
    diger: document.getElementById("diger").value.trim()
  };
}
function setForm(d) {
  document.getElementById("ad_soyad").value = d.ad_soyad || "";
  document.getElementById("tarih").value = d.tarih || "";
  talepSecimleriniSetEt(d.talepListe || (d.talep ? String(d.talep).split(", ") : []));
  document.getElementById("kisi").value = d.kisi || "";
  document.getElementById("gelir").value = d.gelir || "";
  document.getElementById("saglik").value = d.saglik || "";
  document.getElementById("borc").value = d.borc || "";
  document.getElementById("arac_durum").value = d.arac_durum || "";
  document.getElementById("arac_detay").value = d.arac_detay || "";
  document.getElementById("tapu_durum").value = d.tapu_durum || "";
  document.getElementById("tapu_detay").value = d.tapu_detay || "";
  document.getElementById("sydv_durum").value = d.sydv_durum || "";
  document.getElementById("sydv").value = d.sydv || "";
  document.getElementById("belediye_durum").value = d.belediye_durum || "";
  document.getElementById("belediye").value = d.belediye || "";
  document.getElementById("diger").value = d.diger || "";
  durumDetayGuncelle("arac_durum","arac_detay_wrap","arac_detay");
  durumDetayGuncelle("tapu_durum","tapu_detay_wrap","tapu_detay");
  durumDetayGuncelle("sydv_durum","sydv_detay_wrap","sydv");
  durumDetayGuncelle("belediye_durum","belediye_detay_wrap","belediye");
}
function mesaj(metin, ok=true) {
  const el = document.getElementById("form-mesaj");
  el.textContent = metin;
  el.style.display = "block";
  el.style.background = ok ? "#d1fae5" : "#fef2f2";
  el.style.border = `1.5px solid ${ok ? "#6ee7b7" : "#fecaca"}`;
  el.style.color = ok ? "#065f46" : "#c0392b";
  setTimeout(() => el.style.display = "none", 2500);
}

function kaydet() {
  const form = getForm();
  if (!form.ad_soyad) { mesaj("Adı Soyadı zorunludur!", false); return; }
  const liste = yukle();
  if (secili !== null) {
    const idx = liste.findIndex(k => k.id === secili);
    if (idx !== -1) liste[idx] = { ...liste[idx], ...form };
  } else {
    const k = { ...form, id: Date.now() };
    liste.push(k);
    secili = k.id;
    document.getElementById("kaydet-label").textContent = "Güncelle";
  }
  kaydet_depo(liste);
  mesaj("✅ Kaydedildi!");
}

function kopyala() {
  const f = getForm();
  const metin = [
    "=== GÖRÜŞME NOTLARI ===",
    f.ad_soyad ? `Ad Soyad: ${f.ad_soyad}` : "",
    f.tarih    ? `Görüşme Tarihi: ${f.tarih}` : "",
    f.talep    ? `Talep: ${f.talep}` : "",
    f.kisi     ? `\nEvdeki kişiler:\n${f.kisi}` : "",
    f.gelir    ? `\nGelir durumu:\n${f.gelir}` : "",
    f.saglik   ? `\nSağlık durumu:\n${f.saglik}` : "",
    f.borc     ? `\nKonut/Borç:\n${f.borc}` : "",
    f.sydv     ? `\nSYDV: ${f.sydv}` : "",
    `\nBelediye yardımları: ${f.belediye || "Yakın zamanda yardım almadığı gözlemlenmiştir."}`,
    f.diger    ? `\nDiğer notlar:\n${f.diger}` : "",
  ].filter(Boolean).join("\n");
  navigator.clipboard.writeText(metin).then(() => {
    const lbl = document.getElementById("kopya-label");
    lbl.textContent = "✅ Kopyalandı!";
    setTimeout(() => lbl.textContent = "📋 Notları Kopyala", 2500);
  });
}

function yeniForm() {
  secili = null;
  setForm({ tarih: bugun() });
  document.getElementById("kaydet-label").textContent = "Kaydet";
  gosterTab("form");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function ac(id) {
  const k = yukle().find(k => k.id === id);
  if (!k) return;
  secili = id;
  setForm(k);
  document.getElementById("kaydet-label").textContent = "Güncelle";
  gosterTab("form");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function sil(id) {
  const liste = yukle().filter(k => k.id !== id);
  kaydet_depo(liste);
  if (secili === id) { secili = null; setForm({ tarih: bugun() }); document.getElementById("kaydet-label").textContent = "Kaydet"; }
  renderListe();
}

function tumunuSil() {
  kaydet_depo([]);
  secili = null;
  setForm({ tarih: bugun() });
  document.getElementById("kaydet-label").textContent = "Kaydet";
  renderListe();
}

function renderListe() {
  const liste = yukle();
  kaydet_depo(liste); // badge güncelle
  const el = document.getElementById("liste-icerik");
  if (liste.length === 0) {
    el.innerHTML = `<div class="bos-mesaj"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-weight:600">Henüz kayıt yok</div><div style="font-size:13px;margin-top:6px">Form sekmesinden görüşme notu ekleyin</div></div>`;
    return;
  }
  el.innerHTML = liste.map(k => `
    <div class="kayit-kart ${secili === k.id ? 'secili' : ''}">
      <div class="kayit-ust">
        <div>
          <div class="kayit-ad">${k.ad_soyad}</div>
          <div class="kayit-alt">${k.tarih ? "📅 "+k.tarih : ""}${k.talep ? "&nbsp;&nbsp;📌 "+k.talep : ""}</div>
        </div>
        <div class="kayit-btns">
          <button class="btn btn-navy btn-sm" onclick="ac(${k.id})">✏️ Aç</button>
          <button class="btn btn-red  btn-sm" onclick="sil(${k.id})">🗑️</button>
        </div>
      </div>
      ${k.kisi ? `<div class="kayit-not">${k.kisi.split("\n")[0]}</div>` : ""}
    </div>`).join("");
}

function gosterTab(tab) {
  document.getElementById("page-form").style.display  = tab === "form"  ? "block" : "none";
  document.getElementById("page-liste").style.display = tab === "liste" ? "block" : "none";
  document.getElementById("btn-tab-form").classList.toggle("active",  tab === "form");
  document.getElementById("btn-tab-liste").classList.toggle("active", tab === "liste");
  if (tab === "liste") renderListe();
}

// Init
document.getElementById("yardim_diger_chk").addEventListener("change", talepDigerGuncelle);
document.getElementById("arac_durum").addEventListener("change", () => durumDetayGuncelle("arac_durum","arac_detay_wrap","arac_detay"));
document.getElementById("tapu_durum").addEventListener("change", () => durumDetayGuncelle("tapu_durum","tapu_detay_wrap","tapu_detay"));
document.getElementById("sydv_durum").addEventListener("change", () => durumDetayGuncelle("sydv_durum","sydv_detay_wrap","sydv"));
document.getElementById("belediye_durum").addEventListener("change", () => durumDetayGuncelle("belediye_durum","belediye_detay_wrap","belediye"));
document.getElementById("tarih").value = bugun();
talepDigerGuncelle();
durumDetayGuncelle("arac_durum","arac_detay_wrap","arac_detay");
durumDetayGuncelle("tapu_durum","tapu_detay_wrap","tapu_detay");
durumDetayGuncelle("sydv_durum","sydv_detay_wrap","sydv");
durumDetayGuncelle("belediye_durum","belediye_detay_wrap","belediye");
const n = yukle().length;
if (n > 0) { document.getElementById("kayit-sayisi").style.display = "inline"; document.getElementById("kayit-sayisi").textContent = n; }
</script>
</body>
</html>
